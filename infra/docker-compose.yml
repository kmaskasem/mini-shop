name: Mini-shop
services:                                                                               # services = จำนวน container ที่จะ run ใน docker-compose
  # บริการที่ 1: Database PostgreSQL
  postgres-db:
    image: postgres:15-alpine # ดึง Image ขนาดเล็กและเสถียร
    container_name: postgres_cont
    ports:
      - "5432:5432" # (พอร์ตเครื่องเรา:พอร์ตข้างใน Container)
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data # เก็บข้อมูลไว้ไม่ให้หายเวลาปิด
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_cont
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - postgres-db
    restart: unless-stopped

  # บริการที่ 2: Database MongoDB
  mongo:
    image: mongo:latest
    container_name: mongo_cont
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: project
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    
  mongo-express:
    image: mongo-express
    container_name: mongo_ex_cont
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - ME_CONFIG_MONGODB_AUTH_DATABASE=admin            
      - ME_CONFIG_MONGODB_AUTH_USERNAME=${MONGO_ROOT_USER}
      - ME_CONFIG_MONGODB_AUTH_PASSWORD=${MONGO_ROOT_PASSWORD}
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGOEXPRESS_LOGIN}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGOEXPRESS_PASSWORD}
    depends_on:
      - mongo
    restart: unless-stopped
    ports:
      - "8888:8081"

  auth-service:
    build:
        context: ../services/auth-service      # path จาก docker-compose.yml ไปหา service
        dockerfile: docker/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres-db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_Issuer}
      - Seed__MasterUsername=${SEED_MASTER_USERNAME}
      - Seed__MasterPassword=${SEED_MASTER_PASSWORD}
    ports:
      - "5000:8080"
    depends_on:
      - postgres-db

# ประกาศที่เก็บข้อมูลรวม (Persistent Volume) ป้องกันข้อมูลหาย
volumes:
  postgres_data:
  mongo_data:

